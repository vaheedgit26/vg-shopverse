# ──────────────────────────────────────
# Frontend
# ──────────────────────────────────────
frontend:
  deploymentName: shopverse-frontend
  replicas: 1
  image: ""  # frontend-image
  serviceName: shopverse-frontend-svc
  servicePort: 8080
  ingressName: shopverse-frontend-ingress
  ingressHost: ""

# ──────────────────────────────────────
# Backend
# ──────────────────────────────────────
backend:
  deploymentName: shopverse-backend
  replicas: 1
  image: ""  # backend-image
  serviceName: shopverse-backend-svc
  servicePort: 8080
  ingressName: shopverse-backend-ingress
  ingressHost: ""

# ──────────────────────────────────────
# MySQL
# ──────────────────────────────────────
mysql:
  external-name-service: shopverse-mysql
  database: shopverse
  user: shopverse
    
# ──────────────────────────────────────
# Shared
# ──────────────────────────────────────
ingress:
  enabled: false
  ingressClassName: alb
  
  annotations: 
    # External ALB
    alb.ingress.kubernetes.io/scheme: internet-facing
    
    # Target pods directly
    alb.ingress.kubernetes.io/target-type: ip
    
    # Listener config
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}'
    alb.ingress.kubernetes.io/ip-address-type: ipv4

    # ALB to Kubernetes service protocol
    alb.ingress.kubernetes.io/backend-protocol: HTTP

    # Health check (applies to all target groups)
    alb.ingress.kubernetes.io/healthcheck-path: /health            # common for all the microservices and best practice
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port

    # Performance / Timeouts
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60

    # Optional tuning (recommended)
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    
    # Grouping (if multiple ingresses later)
    alb.ingress.kubernetes.io/group.name: shopverse
  

jwtSecret: ""
