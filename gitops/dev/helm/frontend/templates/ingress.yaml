apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopverse-frontend-ingress
  annotations:
    alb.ingress.kubernetes.io/group.name: shopverse-dev

    # frontend-specific health check
    alb.ingress.kubernetes.io/healthcheck-path: /health

spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shopverse-frontend-svc
                port:
                  number: 8080
