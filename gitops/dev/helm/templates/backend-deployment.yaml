apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.deploymentName }}
  labels:
    app: shopverse
    component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: shopverse
      component: backend
  template:
    metadata:
      labels:
        app: shopverse
        component: backend
    spec:
      containers:
        - name: backend
          image: "{{ include "shopverse.backend.image" . }}"
          imagePullPolicy: Always        # IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: shopverse-config
            - secretRef:
                name: shopverse-dev-mysql-jwt-credentials
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
