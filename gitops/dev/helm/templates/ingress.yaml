apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopverse-ingress
  annotations:
    # External ALB
    alb.ingress.kubernetes.io/scheme: internet-facing                     # internal

    # Target pods directly
    alb.ingress.kubernetes.io/target-type: ip

    # Listener config
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    
    # ALB to Kubernetes service protocol
    alb.ingress.kubernetes.io/backend-protocol: HTTP

    # Health check (applies to all target groups)
    alb.ingress.kubernetes.io/healthcheck-path: /health            # common for all the microservices and best practice
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port

    # Performance / Timeouts (default is 60s)
    alb.ingress.kubernetes.io/load-balancer-attributes: >
      idle_timeout.timeout_seconds=60

    # Optional tuning (recommended)
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    
    # Grouping (if multiple ingresses later)
    alb.ingress.kubernetes.io/group.name: shopverse

spec:
  ingressClassName: alb   # ✅ modern standard
  
  rules:
    - http:
        paths:
        
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: shopverse-backend-svc
                port:
                  number: 8080

          - path: /
            pathType: Prefix
            backend:
              service:
                name: shopverse-frontend-svc
                port:
                  number: 8080
