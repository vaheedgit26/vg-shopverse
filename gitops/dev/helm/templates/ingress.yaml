apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopverse-external
  annotations:
    # External ALB
    alb.ingress.kubernetes.io/scheme: internet-facing                     # internal

    # Target pods directly
    alb.ingress.kubernetes.io/target-type: ip

    # Listener config
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    # Health check (applies to all target groups)
    alb.ingress.kubernetes.io/healthcheck-path: /health            # common for all the microservices and best practice
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port

    # Optional tuning (recommended)
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    
    # Grouping (if multiple ingresses later)
    alb.ingress.kubernetes.io/group.name: ecommerce-internal

spec:
  ingressClassName: alb   # ✅ modern standard
  
  defaultBackend:
    service:
      name: shopverse-frontend-svc
      port:
        number: 8080

  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: shopverse-backend-svc
                port:
                  number: 8080

          - path: /
            pathType: Prefix
            backend:
              service:
                name: shopverse-frontend-svc
                port:
                  number: 8080
