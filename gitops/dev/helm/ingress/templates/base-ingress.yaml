apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}                            # shopverse-base-ingress
  annotations:
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }}    # alb

  # ⚠️ Dummy rule (required to create ALB)
  rules:
    - http:
        paths:
          - path: /dummy
            pathType: Prefix
            backend:
              service:
                name: dummy-service
                port:
                  number: 80
